<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Ice Thickness Visualization (1850-2000)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="ice_logic.js" type="module"></script>
</head>

<body>
    <div class="tooltip"></div>
    <div class="container">
        <h1>🌊 Sea Ice Thickness Visualization</h1>
        <div class="subtitle">CMIP6 Model Data | 1850-2000 (Decadal Intervals)</div>
        <p>All decades show ice-sheet data from January 1st.</p>

        <div class="control-panel">
            <label for="yearSlider">Select Decade: </label>
            <input type="range" id="yearSlider" min="1850" max="2000" step="10" value="1850">
            <span id="yearValue">1850</span>
            
            <label for="compareSlider">Comparing to:   </label>
            <input type="range" id="compareSlider" min="1850" max="2000" step="10" value="1850">
            <span id="compareValue">1850</span>
        </div>

        <div id="visualization" class="visualization">
            <div class="loading">Loading visualization...</div>
        </div>

        <div id="colorbar" class="colorbar"></div>

        <div id="point-stats" class="display">
            Loading data...
        </div>
        <div id="overall-stats" class="display">
            Loading data...
        </div>
        <div id="compared-stats" class = "display">
            Loading data...
        </div>
    </div>
</body>

</html>
